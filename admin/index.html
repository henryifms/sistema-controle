<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <title>Controle</title>
  <style>
    body {
      margin: 0;
      font-family: "Segoe UI", sans-serif;
      background: #0f172a;
      color: #e2e8f0;
      display: flex;
      flex-direction: column;
      align-items: center;
      padding: 15px;
    }
    h1 {
      font-size: 16px;
      margin-bottom: 10px;
      color: #38bdf8;
    }
    .card {
      background: #1e293b;
      padding: 12px;
      border-radius: 10px;
      width: 100%;
      box-shadow: 0 4px 10px rgba(0,0,0,0.3);
    }
    .row {
      display: flex;
      gap: 5px;
      margin-bottom: 8px;
    }
    .row input:first-child {
      flex: 3;
    }
    .row input:last-child {
      flex: 1;
    }
    input, select {
      width: 100%;
      padding: 6px;
      border-radius: 6px;
      border: none;
      margin-bottom: 8px;
      background: #0f172a;
      color: white;
    }
    button {
      width: 100%;
      margin-top: 8px;
      padding: 10px;
      border-radius: 6px;
      border: none;
      cursor: pointer;
      font-size: 13px;
      transition: 0.2s;
    }
    button:hover { opacity: 0.85; }
    .connect { background: #38bdf8; color: black; }
    .on { background: #ef4444; color: white; }
    .off { background: #22c55e; color: black; }
    .status {
      margin-top: 8px;
      padding: 6px;
      border-radius: 6px;
      text-align: center;
      font-size: 12px;
    }
    .connected { background: #22c55e; color: black; }
    .disconnected { background: #ef4444; color: white; }
  </style>
</head>

<body>
  <h1>Painel de Controle</h1>

  <div class="card">
    <!-- IP + Porta -->
    <div class="row">
      <input id="ip" value="26397b13b80142.lhr.life" placeholder="Host/IP" />
      <input id="porta" value="80" placeholder="Porta" type="number" />
    </div>

    <select id="sala">
      <option value="LAB1">Lab 1</option>
      <option value="LAB2">Lab 2</option>
    </select>

    <button class="connect" id="connect">Conectar</button>
    
    <div id="status" class="status disconnected">Desconectado</div>

    <button id="btnTeclado" class="off">Teclado Livre</button>
    <button id="btnTela" class="off">Tela Livre</button>
  </div>

  <script src="renderer.js"></script>
</body>
</html>
